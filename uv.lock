version = 1
revision = 1
requires-python = ">=3.11"

[[package]]
name = "supportops-openenv"
version = "0.1.0"
source = { virtual = "." }
dependencies = [
    { name = "fastapi" },
    { name = "openai" },
    { name = "openenv-core" },
    { name = "pydantic" },
    { name = "pyyaml" },
    { name = "uvicorn" },
]

[package.metadata]
requires-dist = [
    { name = "pydantic", specifier = ">=2.6" },
    { name = "PyYAML", specifier = ">=6.0" },
    { name = "fastapi", specifier = ">=0.115" },
    { name = "uvicorn", specifier = ">=0.30" },
    { name = "openenv-core", specifier = ">=0.2.0" },
    { name = "openai", specifier = ">=1.40.0" },
]
